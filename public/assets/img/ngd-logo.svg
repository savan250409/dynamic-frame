<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Outer circle – gray top-left -->
  <circle cx="50" cy="50" r="46" fill="none" stroke="#555555" stroke-width="9"
          stroke-dasharray="144 289" stroke-dashoffset="0" stroke-linecap="round"/>
  <!-- Outer circle – orange bottom-right -->
  <circle cx="50" cy="50" r="46" fill="none" stroke="#E8A020" stroke-width="9"
          stroke-dasharray="145 288" stroke-dashoffset="-144" stroke-linecap="round"/>

  <!-- Inner N-shape — gray left stroke -->
  <polyline points="28,70 28,30 50,65 50,30"
            fill="none" stroke="#555555" stroke-width="9"
            stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Inner N-shape — orange right stroke -->
  <polyline points="50,65 50,30 72,70 72,30"
            fill="none" stroke="#E8A020" stroke-width="9"
            stroke-linecap="round" stroke-linejoin="round"/>
</svg>
